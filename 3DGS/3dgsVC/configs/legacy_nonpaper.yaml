# Legacy/non-paper profile kept for debugging and backward compatibility.
mode:
  paper_faithful: false
  experimental_reproduction: true
  self_supervised_deploy: false
  strict_cuda: false
  require_lpips: false
  auto_test_after_train: true

data:
  data_path: "/data/data54/wanghaobo/data/3D_Data/raw_data2/ksp.mat"
  csm_path: null
  acceleration_factor: 4
  mask_type: "poisson"
  readout_axis: 0
  phase_axes: [1, 2]
  use_acs: true
  acs_lines: 32

gaussian:
  initial_num_points: 200000
  max_num_points: 400000
  density_scale_k: 0.2
  init_method: "from_image"
  init_mode: "importance"
  position_lr: 0.001
  scale_lr: 0.005
  rotation_lr: 0.001
  density_lr: 0.01
  complex_density: true
  long_axis_offset_factor: 1.0

adaptive_control:
  enable: true
  strategy: "auto"
  densify_from_iter: 100
  densify_every: 100
  densify_until_iter: 2500
  grad_threshold: 0.005
  scale_threshold: 0.01
  opacity_threshold: 0.01
  max_scale: 0.5
  high_acceleration_threshold: 10
  use_long_axis_splitting: true
  use_cloning: false

training:
  max_iterations: 3000
  save_every: 500
  log_every: 50
  eval_every: 100
  lr_scheduler:
    type: "exponential"
    gamma: 0.999
  seed: 42
  max_grad_norm: 1.0

loss:
  kspace_weight: 1.0
  image_weight: 0.0
  tv_weight: 0.1
  loss_type: "l2"

stopping:
  enable_metric_plateau: false
  enable_loss_plateau: false
  min_iterations_before_stop: 0
  patience_evals: 0
  best_metric: "psnr"
  metric_min_delta:
    psnr: 0.05
    ssim: 0.0005
    lpips: 0.001
  loss_min_delta: 1.0

output:
  output_dir: "./results"
  exp_name: "3dgsmr_legacy"
  save_nii: true
  save_npy: true
  use_tensorboard: true

test:
  slices:
    axial: [57, 85, 114]
    coronal: [45, 68, 90]
    sagittal: [52, 78, 104]

hardware:
  device: "cuda:0"
  use_amp: false
  num_workers: 16

voxelizer:
  type: "chunk"
  tile_size: 8
  max_radius: 20
  reference_type: "tile"
